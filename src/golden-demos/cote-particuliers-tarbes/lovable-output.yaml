  unsupportedCapabilities:
    - category: navigation
      importance: medium
      label: "Navigation transparente devenant claire au scroll"
      description: "La démo bascule la barre de navigation de surface transparente à surface claire avec fond flouté après 60 px de scroll. Signature Digital expose surface light/dark/transparent et behavior static/sticky, mais pas de transition d'état liée au scroll."
    - category: hero
      importance: low
      label: "Bandeau de preuves chiffrées intégré au bas du hero"
      description: "La démo affiche quatre statistiques (ans, taux au prix, délai, satisfaction) directement dans le hero plein écran. Le hero Signature Digital ne prévoit pas de sous-bloc de proof intégré."
    - category: section
      importance: low
      label: "Bandeau marquee de mots-clés éditoriaux entre hero et properties"
      description: "Bande fine avec valeurs séparées par un losange. Aucun type de section publique ne correspond exactement à ce marqueur visuel."
    - category: section
      importance: medium
      label: "Section 'localArea' cinématographique dédiée"
      description: "La démo utilise une section image plein écran avec titre en filigrane pour ancrer l'implantation locale. Elle est déclarée comme agencyStory / editorial faute de type localArea officiel."
    - category: propertyCards
      importance: low
      label: "Prix affiché en typographie serif accent laiton, aligné à droite du titre"
      description: "Le contrat propertyCards.pricePosition offre top/content/footer/overlay mais ne différencie pas le style typographique du prix (serif accentué vs sans-serif)."
